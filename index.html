<body>
  <header class="app-header">
    <h1 class="visually-hidden">띵동 제철음식</h1>
    <div class="header-bar" role="banner">
      <div class="brand" aria-label="브랜드">
        <span class="brand__primary">띵동 제철음식</span>
      </div>
      <div class="header-controls" style="position: relative;">
        <form id="filtersForm" class="header-search" onsubmit="return false;" role="search">
          <input id="searchInput" class="search-input" type="search" placeholder="이름·설명 검색" autocomplete="off"
            inputmode="search" aria-describedby="searchHelp">
          <p id="searchHelp" class="visually-hidden">이름과 설명에서 검색합니다. 대소문자를 구분하지 않습니다.</p>
        </form>
        <button id="settingButton" class="setting-button" type="button" aria-label="알림 설정" title="알림 설정">
          <svg class="setting-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path
              d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" />
          </svg>
        </button>
        <div id="notiTooltip" class="notification-tooltip">제철 식재료와 명절 음식 알림을 받아보세요!</div>
      </div>
    </div>
  </header>

  <div id="offlineNotice" class="offline-notice" role="status" aria-live="polite" hidden>
    <div class="offline-notice__box">
      <span class="offline-notice__icon" aria-hidden="true">📶</span>
      <div class="offline-notice__text">
        <strong>오프라인 상태입니다.</strong>
        <p>네트워크 연결을 확인해 주세요. 저장된 데이터는 계속 이용할 수 있습니다.</p>
      </div>
    </div>
  </div>

  <!-- 월 네비게이터 -->
  <nav id="monthNav" class="month-nav" aria-label="월 선택">
    <button id="prevMonthBtn" class="month-nav__btn" type="button" aria-label="이전 달">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z" />
      </svg>
    </button>
    <button id="monthLabel" class="month-nav__label" type="button" aria-label="오늘 달로 이동">
      <span id="monthLabelText">1월</span>
    </button>
    <button id="nextMonthBtn" class="month-nav__btn" type="button" aria-label="다음 달">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z" />
      </svg>
    </button>
  </nav>

  <main>
    <section class="carousel" aria-label="이달의 제철 식재료">
      <div id="carouselContainer" class="carousel__container">
        <div id="periodTrack" class="carousel__track" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <!-- 하단 탭바 (GNB) -->

        <path d="M13.5 7.12l-1.35-2.62-1.35 2.62-2.62 1.35 2.62 1.35 1.35 2.62 1.35-2.62 2.62-1.35zM7.5 14.5l-.85-1.65-1.65-.85 1.65-.85.85-1.65.85 1.65 1.65.85-1.65.85z"/>

      </svg>
      <span class="gnb__label">분석</span>
    </a>

  <!-- 실시간 카메라 스캔 화면 오버레이 -->
  <div id="cameraScannerOverlay" class="scanner-overlay" style="display: none;">
    <div class="scanner-header">
      <button id="btnExitScanner" class="scanner-exit-btn" aria-label="닫기">✕</button>
      <h2 class="scanner-title">식재료 고르는 방법</h2>
    </div>
    
    <!-- 카메라 가이드 네모 박스 (calorie.css와 공유) -->
    <div class="scanner-frame-container">
      <div class="scanner-frame">
        <div class="corner-tl"></div>
        <div class="corner-tr"></div>
        <div class="corner-bl"></div>
        <div class="corner-br"></div>
      </div>
    </div>
    
    <!-- 안내 문구 -->
    <p class="scanner-guide-text">식재료를 화면 중앙에 맞추고<br>아래 버튼을 눌러 촬영하세요</p>
    
    <!-- 실시간 사물 인식 결과 반투명 안내 카드 -->
    <div id="scannerResultCard" class="scanner-result-card" style="display: none;">
      <h3 id="detectedFoodName" class="detected-food-name"></h3>
      <p id="detectedFoodTips" class="detected-food-tips"></p>
    </div>

    <!-- 하단: 셔터 버튼 + 로딩 스피너 -->
    <div class="scanner-bottom-area">
      <button id="btnCapturePhoto" class="scanner-shutter-btn" type="button" aria-label="사진 촬영">
        <span class="shutter-inner"></span>
      </button>
      <div id="scannerLoading" class="scanner-loading" style="display: none;">
        <span class="scanner-loading__spinner"></span>
        <span class="scanner-loading__text">AI가 분석 중입니다...</span>
      </div>
    </div>
  </div>


  <template id="cardTemplate">
    <div class="card" role="listitem">
      <div class="thumb" aria-hidden="true">
        <img class="photo" src="" alt="" width="600" height="600" loading="lazy" />
      </div>
      <div class="card-content">
        <div class="title" aria-label="이름"></div>
        <div class="popular-dish" aria-label="대표 요리">
          <span class="popular-dish-value"></span>
        </div>
      </div>
    </div>
  </template>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/service-worker.js').catch(function () { });
      });
    }
    if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
      document.documentElement.classList.add('app-installed');
    }
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!sessionStorage.getItem('notiTutorialShown')) {
        const tooltip = document.getElementById('notiTooltip');
        const settingBtn = document.getElementById('settingButton');

        if (tooltip && settingBtn) {
          // 초기 렌더링 안정화를 위해 약간의 지연 후 실행
          setTimeout(() => {
            tooltip.classList.add('show');
            settingBtn.classList.add('glow');

            // 말풍선은 5초 후 사라짐
            setTimeout(() => {
              tooltip.classList.remove('show');
            }, 5000);

            // 알람 종 빛나는 애니메이션은 7초 후 사라짐
            setTimeout(() => {
              settingBtn.classList.remove('glow');
            }, 7000);

            sessionStorage.setItem('notiTutorialShown', 'true');
          }, 500);
        }
      }
    });
  </script>
