<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>띵동 제철음식 - 명절·절기</title>


  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '%VITE_GA_ID%');
  </script>

  <!-- MS Clarity -->
  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "%VITE_CLARITY_ID%");
  </script>

  <link rel="stylesheet" href="assets/style.css">

  <style>
    .holidays-container {
      padding: calc(var(--header-offset, 80px) + 20px) 20px 80px;
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
  </style>
</head>

<body class="page-holidays">
  <header class="app-header">
    <h1 class="visually-hidden">띵동 제철음식</h1>
    <div class="header-bar" role="banner">
      <div class="brand" aria-label="브랜드">
        <span class="brand__primary">띵동 제철음식</span>
      </div>
      <div class="header-controls">
        <form id="filtersForm" class="header-search" onsubmit="return false;" role="search">
          <input id="searchInput" class="search-input" type="search" placeholder="이름·설명 검색" autocomplete="off"
            inputmode="search" aria-describedby="searchHelp">
          <p id="searchHelp" class="visually-hidden">이름과 설명에서 검색합니다. 대소문자를 구분하지 않습니다.</p>
        </form>
        <button id="settingButton" class="setting-button" type="button" aria-label="알림 설정" title="알림 설정">
          <svg class="setting-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path
              d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="holidays-container" id="holidayListContainer">
    <!-- JS로 리스트 렌더링 -->
  </main>

  <!-- 하단 탭바 (GNB) -->
  <nav class="gnb" aria-label="하단 네비게이션">
    <a href="calorie.html" class="gnb__item">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M13.5 0.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/>
      </svg>
      <span class="gnb__label">분석</span>
    </a>
  </nav>

  <script type="module" src="assets/holidays-list.js?v=2"></script>
  <script>
    window.addEventListener('load', () => {
      const header = document.querySelector('.holidays-header');
      if (header) {
        document.documentElement.style.setProperty('--header-offset', `${header.offsetHeight}px`);
      }
    });
  </script>
  <script type="module" src="assets/app-back-button.js"></script>
</body>

</html>
