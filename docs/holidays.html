<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>띵동 제철음식 - 명절·절기</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>

      .holidays-container {
        padding: calc(var(--header-offset, 80px) + 20px) 20px 80px;
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .holiday-item {
        display: flex;
        align-items: center;
        gap: 16px;
        background: #fff;
        padding: 16px;
        border-radius: var(--border-radius-sm);
        box-shadow: var(--shadow-sm);
        text-decoration: none;
        color: inherit;
        border: 1px solid var(--glass-border);
        transition: transform 0.2s;
      }
      .holiday-item:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }
      .holiday-thumb {
        width: 64px;
        height: 64px;
        border-radius: 12px;
        object-fit: cover;
        background: #f0f0f0;
      }
      .holiday-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .holiday-name {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 0;
        color: var(--text);
      }
      .holiday-date {
        font-size: 0.85rem;
        color: var(--primary);
        font-weight: 600;
      }
      .holiday-desc {
        font-size: 0.9rem;
        color: #666;
        margin: 0;
        line-height: 1.4;
      }
    </style>
    <script type="module" crossorigin src="/assets/holidays.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill.js">
    <link rel="modulepreload" crossorigin href="/assets/korean-lunar-calendar.js">
    <link rel="stylesheet" crossorigin href="/assets/style.css">
  </head>
  <body>
    <header class="app-header">
      <h1 class="visually-hidden">띵동 제철음식</h1>
      <div class="header-bar" role="banner">
        <div class="brand" aria-label="브랜드">
          <span class="brand__primary">띵동 제철음식</span>
        </div>
        <div class="header-controls">
          <form id="filtersForm" class="header-search" onsubmit="return false;" role="search">
            <input id="searchInput" class="search-input" type="search" placeholder="이름·설명 검색" autocomplete="off" inputmode="search" aria-describedby="searchHelp">
            <p id="searchHelp" class="visually-hidden">이름과 설명에서 검색합니다. 대소문자를 구분하지 않습니다.</p>
          </form>
          <button id="settingButton" class="setting-button" type="button" aria-label="알림 설정" title="알림 설정">
            <svg class="setting-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="holidays-container" id="holidayListContainer">
      <!-- JS로 리스트 렌더링 -->
    </main>

    <!-- 하단 탭바 (GNB) -->
    <nav class="gnb" aria-label="하단 네비게이션">
      <a href="index.html" class="gnb__item">
        <svg class="gnb__icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="gnb__label">제철 식재료</span>
      </a>
      <a href="holidays.html" class="gnb__item active" aria-current="page">
        <svg class="gnb__icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/>
        </svg>
        <span class="gnb__label">명절·절기</span>
      </a>
    </nav>

    <script>
      window.addEventListener('load', () => {
        const header = document.querySelector('.holidays-header');
        if (header) {
          document.documentElement.style.setProperty('--header-offset', `${header.offsetHeight}px`);
        }
      });
    </script>
  </body>
</html>
