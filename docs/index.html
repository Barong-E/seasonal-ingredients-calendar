    <header class="app-header">
      <h1 class="visually-hidden">띵동 제철음식</h1>
      <div class="header-bar" role="banner">
        <div class="brand" aria-label="브랜드">
          <span class="brand__primary">띵동 제철음식</span>
        </div>
        <div class="header-controls">
          <form id="filtersForm" class="header-search" onsubmit="return false;" role="search">
            <input id="searchInput" class="search-input" type="search" placeholder="이름·설명 검색" autocomplete="off" inputmode="search" aria-describedby="searchHelp">
            <p id="searchHelp" class="visually-hidden">이름과 설명에서 검색합니다. 대소문자를 구분하지 않습니다.</p>
          </form>
          <button id="settingButton" class="setting-button" type="button" aria-label="알림 설정" title="알림 설정">
            <svg class="setting-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div id="offlineNotice" class="offline-notice" role="status" aria-live="polite" hidden>
      <div class="offline-notice__box">
        <span class="offline-notice__icon" aria-hidden="true">📶</span>
        <div class="offline-notice__text">
          <strong>오프라인 상태입니다.</strong>
          <p>네트워크 연결을 확인해 주세요. 저장된 데이터는 계속 이용할 수 있습니다.</p>
        </div>
      </div>
    </div>

    <main>
      <section class="carousel" aria-label="시기 선택">
        <div id="carouselContainer" class="carousel__container">
          <div id="periodTrack" class="carousel__track" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <!-- 하단 탭바 (GNB) -->
    <nav class="gnb" aria-label="하단 네비게이션">

    <template id="panelTemplate">

        <div class="empty" role="status" aria-live="polite">검색 결과가 없습니다.</div>

    </template>

    <template id="cardTemplate">
      <div class="card" role="listitem">
        <div class="thumb" aria-hidden="true">
          <img class="photo" src="" alt="" width="600" height="600" loading="lazy" />
        </div>
        <div class="card-content">
          <div class="title" aria-label="이름"></div>
          <div class="calories" aria-label="칼로리">
            <span class="calories-icon">🔥</span>
            <span class="calories-value"></span>
          </div>
        </div>
      </div>
    </template>
