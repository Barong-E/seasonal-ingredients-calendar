<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>띵동 제철음식 - 즐겨찾기 보관함</title>
  <meta name="description" content="내가 즐겨찾기한 제철 식재료, 건강 레시피, 전통 명절 정보를 한눈에 모아보세요. 기기 변경 대비 백업/복구 기능도 제공합니다.">
  <meta name="robots" content="index, follow">

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0A7B34">
  <link rel="icon" href="/images/icons/app-icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/images/icons/app-icon-192.png">

  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/favorites.css">
</head>

<body class="favorites-page">
  <header class="app-header">
    <h1 class="visually-hidden">즐겨찾기 보관함</h1>
    <div class="header-bar" role="banner">
      <div class="brand" aria-label="브랜드">
        <span class="brand__primary">즐겨찾기 보관함</span>
      </div>
    </div>
  </header>

  <!-- 탭 컨트롤러 -->
  <div class="tab-container" role="tablist">
    <button class="tab-btn active" role="tab" aria-selected="true" data-tab="ingredients">🥬 식재료</button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="recipes">🍲 레시피</button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="holidays">📅 명절·절기</button>
  </div>

  <main class="favorites-main">
    <div id="favoritesList" class="favorites-grid" role="list">
      <!-- 동적 카드 목록이 여기에 들어갑니다 -->
    </div>
    <div id="emptyState" class="empty-state" style="display: none;">
      <span class="empty-state__icon">❤️</span>
      <p class="empty-state__title">보관함이 비어 있습니다</p>
      <p class="empty-state__desc">식재료, 레시피, 명절 화면에서 하트 버튼을 눌러 소중한 정보를 저장해 보세요!</p>
    </div>

    <!-- 백업 & 복구 아코디언 -->
    <details class="backup-details">
      <summary class="backup-summary">📂 즐겨찾기 백업 및 복원</summary>
      <div class="backup-content">
        <p class="backup-help">기기를 변경하거나 앱을 지우기 전, 현재 즐겨찾기 목록을 복사해 보관할 수 있습니다.</p>
        <div class="backup-actions">
          <button id="btnExport" class="backup-btn" type="button">📋 백업 코드 복사하기</button>
          <button id="btnImport" class="backup-btn backup-btn--secondary" type="button">📥 백업 코드 불러오기</button>
        </div>
      </div>
    </details>
  </main>

  <!-- 하단 탭바 (GNB) -->
  <nav class="gnb" aria-label="하단 네비게이션">
    <a href="index.html" class="gnb__item">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>
        <path d="M13.5 7.12l-1.35-2.62-1.35 2.62-2.62 1.35 2.62 1.35 1.35 2.62 1.35-2.62 2.62-1.35zM7.5 14.5l-.85-1.65-1.65-.85 1.65-.85.85-1.65.85 1.65 1.65.85-1.65.85z"/>
      </svg>
      <span class="gnb__label">감별</span>
    </a>
    <a href="calorie.html" class="gnb__item">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M13.5 0.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/>
      </svg>
      <span class="gnb__label">분석</span>
    </a>
  </nav>

  <script type="module" src="assets/favorites.js"></script>
  <script>
    function syncHeaderOffset() {
      const header = document.querySelector('.app-header');
      if (header) {
        document.documentElement.style.setProperty('--header-offset', header.offsetHeight + 'px');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', syncHeaderOffset);
    } else {
      syncHeaderOffset();
    }
    window.addEventListener('load', syncHeaderOffset);
    window.addEventListener('resize', syncHeaderOffset);
  </script>
  <script type="module" src="assets/app-back-button.js"></script>
</body>

</html>
