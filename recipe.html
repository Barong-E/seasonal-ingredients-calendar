<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>레시피 - 띵동 제철음식 | seasonalfood.net</title>
  <meta name="description" content="제철 식재료로 만드는 한국 전통 요리 레시피">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0A7B34">
  <link rel="icon" href="/images/icons/app-icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/images/icons/app-icon-192.png">

  <link rel="stylesheet" href="assets/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '%VITE_GA_ID%');
  </script>

  <!-- MS Clarity -->
  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "%VITE_CLARITY_ID%");
  </script>

  <link rel="stylesheet" href="assets/recipe.css">
</head>

<body>
  <header class="app-header">
    <h1 class="visually-hidden">레시피 페이지</h1>
    <div class="header-bar" role="banner">
      <button id="backButton" class="back-button" type="button" aria-label="뒤로 가기" title="뒤로 가기">
        <svg class="back-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
        </svg>
      </button>
      <div class="brand" aria-label="브랜드">
        <span class="brand__primary">제철·명절</span>
        <span class="brand__secondary">음식</span>
      </div>
      <button id="favoriteButton" class="favorite-button" type="button" aria-label="즐겨찾기 추가" title="즐겨찾기 추가">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="recipe-main">
    <div class="recipe-container">
      <!-- 레시피 헤더 -->
      <section class="recipe-header">
        <div class="recipe-header-container">
          <div class="recipe-image-wrapper">
            <img id="recipeImage" class="recipe-image" src="" alt="레시피 이미지" onerror="this.src='images/_fallback.png'">
          </div>
          <div class="recipe-title-section">
            <h2 id="recipeName" class="recipe-name"></h2>
            <p id="recipeDescription" class="recipe-description"></p>
            <div class="wakelock-container">
              <div id="wakeLockBadge" class="wakelock-badge" role="status" aria-live="polite">
                <span class="badge-icon">💡</span>화면 켜짐 유지 중
              </div>
              <label class="switch" title="화면 켜짐 유지 켜기/끄기">
                <input type="checkbox" id="wakeLockToggle" checked>
                <span class="slider round"></span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- 레시피 정보 -->
      <section class="recipe-info">
        <div class="info-item servings-control-item">
          <span class="info-icon">👥</span>
          <span class="info-label">분량</span>
          <div class="servings-control">
            <button id="btnMinusServings" class="btn-servings" type="button" aria-label="인분 감소" title="인분 감소">−</button>
            <span id="recipeServings" class="info-value"></span>
            <button id="btnPlusServings" class="btn-servings" type="button" aria-label="인분 증가" title="인분 증가">+</button>
          </div>
        </div>
        <div class="info-item">
          <span class="info-icon">⏱️</span>
          <span class="info-label">조리시간</span>
          <span id="recipeCookTime" class="info-value"></span>
        </div>
        <div class="info-item">
          <span class="info-icon">📊</span>
          <span class="info-label">난이도</span>
          <span id="recipeDifficulty" class="info-value"></span>
        </div>
      </section>

      <!-- 재료 섹션 -->
      <section class="recipe-section">
        <h3 class="section-title">
          <span class="section-icon">🥬</span>
          재료
        </h3>
        <div id="ingredientsList" class="ingredients-list"></div>
      </section>

      <!-- 양념 섹션 -->
      <section id="seasoningSection" class="recipe-section" style="display: none;">
        <h3 class="section-title">
          <span class="section-icon">🧂</span>
          양념
        </h3>
        <div id="seasoningList" class="ingredients-list"></div>
      </section>

      <!-- 조리 과정 섹션 -->
      <section class="recipe-section">
        <h3 class="section-title">
          <span class="section-icon">👨‍🍳</span>
          조리 과정
        </h3>
        <div id="stepsList" class="steps-list"></div>
      </section>

      <!-- 팁 섹션 -->
      <section id="tipsSection" class="recipe-section" style="display: none;">
        <h3 class="section-title">
          <span class="section-icon">💡</span>
          조리 팁
        </h3>
        <ul id="tipsList" class="tips-list"></ul>
      </section>


    </div>
  </main>

  <script type="module" src="assets/recipe.js?v=5"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/service-worker.js').catch(function () { });
      });
    }
    if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
      document.documentElement.classList.add('app-installed');
    }
  </script>
  <script type="module" src="assets/app-back-button.js"></script>
</body>

</html>
