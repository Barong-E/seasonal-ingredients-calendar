<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>띵동 제철음식 - 칼로리 분석</title>
  <meta name="description" content="음식 사진을 찍으면 AI가 칼로리, 단백질, 탄수화물, 지방을 분석해줍니다. 하루 식사를 기록하고 목표 칼로리를 관리하세요.">
  <meta name="robots" content="index, follow">

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0A7B34">
  <link rel="icon" href="/images/icons/app-icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/images/icons/app-icon-192.png">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '%VITE_GA_ID%');
  </script>

  <!-- MS Clarity -->
  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "%VITE_CLARITY_ID%");
  </script>

  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/calorie.css">
</head>

<body class="calorie-page">
  <header class="app-header">
    <h1 class="visually-hidden">칼로리 분석</h1>
    <div class="header-bar" role="banner">
      <div class="brand" aria-label="브랜드">
        <span class="brand__primary">🔥 칼로리 분석</span>
      </div>
    </div>
  </header>

  <main class="calorie-main">
    <!-- 오늘의 칼로리 요약 -->
    <section class="calorie-summary" id="calorieSummary">
      <div class="calorie-gauge">
        <svg class="gauge-svg" viewBox="0 0 120 120">
          <circle class="gauge-bg" cx="60" cy="60" r="52" fill="none" stroke="#e9ecef" stroke-width="10"/>
          <circle class="gauge-fill" id="gaugeFill" cx="60" cy="60" r="52" fill="none" stroke="url(#gaugeGradient)" stroke-width="10" stroke-linecap="round" stroke-dasharray="326.73" stroke-dashoffset="326.73" transform="rotate(-90 60 60)"/>
          <defs>
            <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#10b981"/>
              <stop offset="100%" stop-color="#059669"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="gauge-text">
          <span class="gauge-current" id="gaugeCurrentCal">0</span>
          <span class="gauge-divider">/ <span id="btnTargetSetting" class="gauge-target-clickable" role="button" tabindex="0" aria-label="목표 칼로리 설정"><span id="gaugeTargetCal">2,000</span></span></span>
          <span class="gauge-unit">kcal</span>
        </div>
      </div>

      <!-- 매크로 프로그레스 바 -->
      <div class="macro-bars">
        <div class="macro-bar">
          <div class="macro-bar__header">
            <span class="macro-bar__label">🥩 단백질</span>
            <span class="macro-bar__value" id="macroProtein">0g</span>
          </div>
          <div class="macro-bar__track"><div class="macro-bar__fill macro-bar__fill--protein" id="macroProteinFill"></div></div>
        </div>
        <div class="macro-bar">
          <div class="macro-bar__header">
            <span class="macro-bar__label">🍚 탄수화물</span>
            <span class="macro-bar__value" id="macroCarbs">0g</span>
          </div>
          <div class="macro-bar__track"><div class="macro-bar__fill macro-bar__fill--carbs" id="macroCarbsFill"></div></div>
        </div>
        <div class="macro-bar">
          <div class="macro-bar__header">
            <span class="macro-bar__label">🧈 지방</span>
            <span class="macro-bar__value" id="macroFat">0g</span>
          </div>
          <div class="macro-bar__track"><div class="macro-bar__fill macro-bar__fill--fat" id="macroFatFill"></div></div>
        </div>
      </div>
    </section>

    <!-- 오늘 먹은 음식 리스트 -->
    <section class="meal-list-section">
      <h2 class="meal-list-title">🍽️ 오늘 먹은 음식</h2>
      <div id="mealList" class="meal-list">
        <!-- JS로 동적 렌더링 -->
      </div>
      <div id="mealEmptyState" class="meal-empty-state">
        <span class="meal-empty-icon">📸</span>
        <p class="meal-empty-title">아직 기록이 없어요</p>
        <p class="meal-empty-desc">아래 카메라 버튼을 눌러 오늘 먹은 음식을 촬영해 보세요!</p>
      </div>
    </section>
  </main>

  <!-- 카메라 FAB 버튼 -->
  <button id="fabCamera" class="fab-camera" type="button" aria-label="음식 촬영하기">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="#fff">
      <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
    </svg>
  </button>

  <!-- 분석 중 오버레이 (CalAI 스타일) -->
  <div id="analysisOverlay" class="analysis-overlay" style="display:none;">
    <div class="analysis-backdrop"></div>
    <div class="analysis-content">
      <div class="analysis-photo-frame">
        <img id="analysisPhoto" class="analysis-photo" src="" alt="촬영된 음식">
        <div class="analysis-scan-line"></div>
      </div>
      <div class="analysis-progress">
        <div class="analysis-progress__ring">
          <svg viewBox="0 0 60 60">
            <circle cx="30" cy="30" r="26" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
            <circle class="analysis-progress__circle" id="analysisProgressCircle" cx="30" cy="30" r="26" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-dasharray="163.36" stroke-dashoffset="163.36" transform="rotate(-90 30 30)"/>
          </svg>
          <span class="analysis-progress__text" id="analysisProgressText">0%</span>
        </div>
      </div>
      <p class="analysis-status" id="analysisStatus">🔥 음식을 분석하고 있어요...</p>
      <button class="analysis-cancel-btn" id="analysisCancelBtn" type="button">취소</button>
    </div>
  </div>

  <!-- 결과 바텀시트 -->
  <div id="resultSheet" class="result-sheet" style="display:none;">
    <div class="result-sheet__backdrop" id="resultBackdrop"></div>
    <div class="result-sheet__content">
      <div class="result-sheet__handle"></div>
      <div class="result-sheet__body">
        <div class="result-header">
          <h3 class="result-food-name" id="resultFoodName">음식 이름</h3>
          <span class="result-serving">1인분 기준</span>
        </div>
        <div class="result-calories">
          <span class="result-calories__icon">🔥</span>
          <span class="result-calories__number" id="resultCalories">0</span>
          <span class="result-calories__unit">kcal</span>
        </div>
        <div class="result-macros">
          <div class="result-macro">
            <span class="result-macro__label">단백질</span>
            <span class="result-macro__value" id="resultProtein">0g</span>
          </div>
          <div class="result-macro">
            <span class="result-macro__label">탄수화물</span>
            <span class="result-macro__value" id="resultCarbs">0g</span>
          </div>
          <div class="result-macro">
            <span class="result-macro__label">지방</span>
            <span class="result-macro__value" id="resultFat">0g</span>
          </div>
        </div>
        <div class="result-ingredients" id="resultIngredients">
          <!-- 재료 목록 동적 렌더링 -->
        </div>
        <!-- 식사 시간대 태그 -->
        <div class="result-mealtime">
          <span class="result-mealtime__label">식사 시간:</span>
          <div class="mealtime-tags" id="mealtimeTags">
            <button class="mealtime-tag" data-time="breakfast">🌅 아침</button>
            <button class="mealtime-tag" data-time="lunch">☀️ 점심</button>
            <button class="mealtime-tag" data-time="dinner">🌙 저녁</button>
            <button class="mealtime-tag" data-time="latenight">🌃 야식</button>
            <button class="mealtime-tag" data-time="snack">🍪 간식</button>
          </div>
        </div>
        <button class="result-save-btn" id="resultSaveBtn" type="button">✅ 기록하기</button>
      </div>
    </div>
  </div>

  <!-- 목표 칼로리 설정 모달 -->
  <div id="targetModal" class="target-modal" style="display:none;">
    <div class="target-modal__backdrop" id="targetModalBackdrop"></div>
    <div class="target-modal__content">
      <h3 class="target-modal__title">⚙️ 목표 칼로리 설정</h3>
      <p class="target-modal__desc">하루 목표 칼로리를 입력해주세요</p>
      <div class="target-modal__input-group">
        <input type="number" id="targetCalorieInput" class="target-modal__input" min="500" max="10000" step="50" placeholder="2000">
        <span class="target-modal__unit">kcal</span>
      </div>
      <div class="target-modal__buttons">
        <button class="target-modal__btn target-modal__btn--cancel" id="targetCancelBtn" type="button">취소</button>
        <button class="target-modal__btn target-modal__btn--save" id="targetSaveBtn" type="button">저장</button>
      </div>
    </div>
  </div>

  <!-- 하단 탭바 (GNB) -->
  <nav class="gnb" aria-label="하단 네비게이션">
    <a href="index.html" class="gnb__item">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M12 6c-2.5 0-4.5 1.8-4.9 4.2-.1.4-.1.8-.1 1.3 0 3.5 2.5 6.5 5 6.5s5-3 5-6.5c0-.5 0-.9-.1-1.3C16.5 7.8 14.5 6 12 6zm2.5-4c-1.4 0-2.5 1.1-2.5 2.5V5h1.5V4.5c0-.6.4-1 1-1h.5V2h-.5z" />
      </svg>
      <span class="gnb__label">재료</span>
    </a>
    <a href="holidays.html" class="gnb__item">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M17 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm-5 7a7.5 7.5 0 0 0-7.5 7.5C4.5 20.43 6.07 22 8 22h12c1.93 0 3.5-1.57 3.5-3.5 0-3.3-2.34-6.07-5.5-6.47V15c0 .55-.45 1-1 1s-1-.45-1-1v-2.88c-.64-.08-1.3-.12-2-.12z M7 15c-.55 0-1 .45-1 1v4h2v-4c0-.55-.45-1-1-1z" />
      </svg>
      <span class="gnb__label">세시</span>
    </a>
    <a href="favorites.html" class="gnb__item">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <span class="gnb__label">찜</span>
    </a>
    <a href="index.html?openCamera=true" class="gnb__item">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="12" cy="12" r="1.5"/>
        <path d="M19.5 8.5c.8 0 1.5-.7 1.5-1.5s-.7-1.5-1.5-1.5-1.5.7-1.5 1.5.7 1.5 1.5 1.5z" opacity=".7"/>
        <path d="M12 3.5C7.3 3.5 3.5 7.3 3.5 12S7.3 20.5 12 20.5 20.5 16.7 20.5 12 16.7 3.5 12 3.5zm0 15c-3.6 0-6.5-2.9-6.5-6.5S8.4 5.5 12 5.5s6.5 2.9 6.5 6.5-2.9 6.5-6.5 6.5z"/>
      </svg>
      <span class="gnb__label">감별</span>
    </a>
    <a href="calorie.html" class="gnb__item active" aria-current="page">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M13.5 0.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/>
      </svg>
      <span class="gnb__label">분석</span>
    </a>
  </nav>

  <script type="module" src="assets/calorie.js"></script>
  <script>
    function syncHeaderOffset() {
      const header = document.querySelector('.app-header');
      if (header) {
        document.documentElement.style.setProperty('--header-offset', header.offsetHeight + 'px');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', syncHeaderOffset);
    } else {
      syncHeaderOffset();
    }
    window.addEventListener('load', syncHeaderOffset);
    window.addEventListener('resize', syncHeaderOffset);
  </script>
  <script type="module" src="assets/app-back-button.js"></script>
</body>

</html>
