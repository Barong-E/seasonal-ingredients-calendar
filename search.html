<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>띵동 제철음식 - 통합 검색 결과</title>
  <meta name="description" content="제철 식재료, 명절·절기 음식, 맛있는 요리 레시피를 한곳에서 쉽고 빠르게 검색해 보세요.">
  <meta name="robots" content="index, follow">

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0A7B34">
  <link rel="icon" href="/images/icons/app-icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/images/icons/app-icon-192.png">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '%VITE_GA_ID%');
  </script>

  <!-- MS Clarity -->
  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "%VITE_CLARITY_ID%");
  </script>

  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/mypage.css">
</head>

<body class="search-page">
  <header class="app-header">
    <div class="header-bar page-header">
      <button class="back-button" onclick="handleSmartBack('index.html')" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <form id="filtersForm" class="header-search" onsubmit="return false;" role="search" style="flex: 1;">
        <input id="searchInput" class="search-input" type="search" placeholder="검색어를 입력해 주세요" autocomplete="off"
          inputmode="search" aria-describedby="searchHelp">
        <p id="searchHelp" class="visually-hidden">이름과 설명에서 검색합니다. 대소문자를 구분하지 않습니다.</p>
      </form>
    </div>
  </header>

  <!-- 탭 컨트롤러 -->
  <div class="search-tab-wrapper">
    <div class="search-tab-container" role="tablist">
      <button class="search-tab-btn active" role="tab" aria-selected="true" data-tab="ingredients">
        🥬 식재료 <span class="badge" id="count-ingredients">0</span>
      </button>
      <button class="search-tab-btn" role="tab" aria-selected="false" data-tab="holidays">
        📅 명절·절기 <span class="badge" id="count-holidays">0</span>
      </button>
      <button class="search-tab-btn" role="tab" aria-selected="false" data-tab="recipes">
        🍲 레시피 <span class="badge" id="count-recipes">0</span>
      </button>
      <button class="search-tab-btn" role="tab" aria-selected="false" data-tab="recommendations">
        👍 추천 <span class="badge" id="count-recommendations">0</span>
      </button>
    </div>
  </div>

  <main class="search-main">
    <div id="searchResultList" class="search-grid" role="list">
      <!-- 동적 카드 목록이 여기에 들어갑니다 -->
    </div>
    <div id="emptyState" class="empty-state" style="display: none;">
      <span class="empty-state__icon">🔍</span>
      <p class="empty-state__title">검색 결과가 없습니다</p>
      <p class="empty-state__desc">다른 키워드로 검색해 보세요!</p>
    </div>
  </main>

  <!-- 하단 GNB -->
  <nav class="gnb" aria-label="하단 네비게이션">
    <a href="index.html" class="gnb__item active" aria-current="page">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M12 6c-2.5 0-4.5 1.8-4.9 4.2-.1.4-.1.8-.1 1.3 0 3.5 2.5 6.5 5 6.5s5-3 5-6.5c0-.5 0-.9-.1-1.3C16.5 7.8 14.5 6 12 6zm2.5-4c-1.4 0-2.5 1.1-2.5 2.5V5h1.5V4.5c0-.6.4-1 1-1h.5V2h-.5z" />
      </svg>
      <span class="gnb__label">재료</span>
    </a>
    <a href="holidays.html" class="gnb__item">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M17 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm-5 7a7.5 7.5 0 0 0-7.5 7.5C4.5 20.43 6.07 22 8 22h12c1.93 0 3.5-1.57 3.5-3.5 0-3.3-2.34-6.07-5.5-6.47V15c0 .55-.45 1-1 1s-1-.45-1-1v-2.88c-.64-.08-1.3-.12-2-.12z M7 15c-.55 0-1 .45-1 1v4h2v-4c0-.55-.45-1-1-1z" />
      </svg>
      <span class="gnb__label">세시</span>
    </a>
    <a href="calorie.html" class="gnb__item">
      <svg class="gnb__icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M13.5 0.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/>
      </svg>
      <span class="gnb__label">분석</span>
    </a>
    <a href="mypage.html" class="gnb__item gnb__item--my">
      <span class="gnb__avatar-wrap">
        <svg class="gnb__icon gnb__icon--person" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <img class="gnb__avatar" alt="" width="22" height="22" hidden>
      </span>
      <span class="gnb__label">MY</span>
    </a>
  </nav>

  <script type="module" src="assets/search.js"></script>
  <script type="module" src="assets/gnb-avatar.js"></script>
  <script>
    function syncHeaderOffset() {
      const header = document.querySelector('.app-header');
      if (header) {
        document.documentElement.style.setProperty('--header-offset', header.offsetHeight + 'px');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', syncHeaderOffset);
    } else {
      syncHeaderOffset();
    }
    window.addEventListener('load', syncHeaderOffset);
    window.addEventListener('resize', syncHeaderOffset);
  </script>
  <script type="module" src="assets/app-back-button.js"></script>
</body>

</html>
